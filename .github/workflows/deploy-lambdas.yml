name: Deploy Lambdas

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Deploy changed Lambdas
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- lambdas/ | grep 'handler.py' | cut -d'/' -f2 | sort -u)
          for fn in $CHANGED; do
            case $fn in
              fetch_videos) FNAME="vrr-fetch-videos" ;;
              transcribe)   FNAME="vrr-transcribe"   ;;
              analyze)      FNAME="vrr-analyze"       ;;
              query)        FNAME="vrr-query"         ;;
              trigger)      FNAME="vrr-trigger"       ;;
              *) continue ;;
            esac
            echo "Deploying $fn → $FNAME"
            zip -j /tmp/${fn}.zip lambdas/${fn}/handler.py
            aws lambda update-function-code \
              --function-name "$FNAME" \
              --zip-file fileb:///tmp/${fn}.zip \
              --publish
          done
